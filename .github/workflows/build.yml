name: build packages

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Bump Flake Inputs" ]
    types:
      - completed
  push:
    branches: [ main ]

jobs:
  build:
    name: "Build packages and upload to cache"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@v2026-02-22

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: frahz-pkgs
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build packages
        run: |
          nix run \
            github:Mic92/nix-fast-build -- \
            --no-nom \
            --skip-cached \
            --option accept-flake-config true \
            --flake '.#hydraJobs.x86_64-linux'
